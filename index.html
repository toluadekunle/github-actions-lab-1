<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Actions Lab 1 — Interactive Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    color: #e2e8f0;
    min-height: 100vh;
    padding: 20px;
    line-height: 1.6;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    padding: 30px 20px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    border-radius: 16px;
    margin-bottom: 30px;
    box-shadow: 0 10px 40px rgba(99, 102, 241, 0.3);
  }

  header h1 {
    font-size: 2rem;
    margin-bottom: 8px;
    color: white;
  }

  header p {
    color: rgba(255, 255, 255, 0.9);
    font-size: 1rem;
  }

  .progress-bar {
    background: #1e293b;
    border-radius: 10px;
    height: 12px;
    overflow: hidden;
    margin-bottom: 30px;
    border: 1px solid #334155;
  }

  .progress-fill {
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    height: 100%;
    width: 0%;
    transition: width 0.4s ease;
  }

  .stats-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
    color: #94a3b8;
    font-size: 0.9rem;
  }

  .question-card {
    background: #1e293b;
    border-radius: 16px;
    padding: 30px;
    margin-bottom: 25px;
    border: 1px solid #334155;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
  }

  .question-number {
    display: inline-block;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 12px;
  }

  .section-tag {
    color: #94a3b8;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .question-text {
    font-size: 1.15rem;
    color: #f1f5f9;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    background: #0f172a;
    border: 2px solid #334155;
    border-radius: 10px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: #e2e8f0;
    font-size: 1rem;
    text-align: left;
    width: 100%;
    font-family: inherit;
  }

  .option:hover:not(:disabled) {
    background: #1e293b;
    border-color: #6366f1;
    transform: translateX(4px);
  }

  .option:disabled {
    cursor: not-allowed;
  }

  .option.selected {
    background: rgba(99, 102, 241, 0.2);
    border-color: #6366f1;
  }

  .option.correct {
    background: rgba(34, 197, 94, 0.15);
    border-color: #22c55e;
    color: #86efac;
  }

  .option.wrong {
    background: rgba(239, 68, 68, 0.15);
    border-color: #ef4444;
    color: #fca5a5;
  }

  .option-letter {
    display: inline-block;
    background: #334155;
    color: #e2e8f0;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    text-align: center;
    line-height: 28px;
    margin-right: 12px;
    font-weight: 600;
    font-size: 0.85rem;
  }

  .option.correct .option-letter {
    background: #22c55e;
    color: white;
  }

  .option.wrong .option-letter {
    background: #ef4444;
    color: white;
  }

  textarea, input[type="text"] {
    width: 100%;
    background: #0f172a;
    border: 2px solid #334155;
    border-radius: 10px;
    padding: 14px;
    color: #e2e8f0;
    font-family: 'Courier New', Monaco, monospace;
    font-size: 0.95rem;
    resize: vertical;
    transition: border-color 0.2s ease;
  }

  textarea:focus, input[type="text"]:focus {
    outline: none;
    border-color: #6366f1;
  }

  textarea {
    min-height: 100px;
  }

  .yaml-input {
    min-height: 220px;
    font-size: 0.9rem;
  }

  .btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-top: 16px;
    font-family: inherit;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: #334155;
  }

  .btn-secondary:hover {
    background: #475569;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
  }

  .feedback {
    margin-top: 16px;
    padding: 16px;
    border-radius: 10px;
    display: none;
    animation: slideIn 0.3s ease;
  }

  .feedback.show {
    display: block;
  }

  .feedback.correct {
    background: rgba(34, 197, 94, 0.1);
    border-left: 4px solid #22c55e;
    color: #86efac;
  }

  .feedback.incorrect {
    background: rgba(239, 68, 68, 0.1);
    border-left: 4px solid #ef4444;
    color: #fca5a5;
  }

  .model-answer {
    margin-top: 16px;
    padding: 18px;
    background: rgba(99, 102, 241, 0.08);
    border-left: 4px solid #6366f1;
    border-radius: 10px;
    display: none;
    animation: slideIn 0.3s ease;
  }

  .model-answer.show {
    display: block;
  }

  .model-answer h4 {
    color: #a5b4fc;
    margin-bottom: 10px;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .model-answer pre {
    background: #0f172a;
    padding: 14px;
    border-radius: 8px;
    overflow-x: auto;
    color: #e2e8f0;
    font-family: 'Courier New', Monaco, monospace;
    font-size: 0.9rem;
    margin-top: 8px;
    border: 1px solid #334155;
    white-space: pre-wrap;
  }

  .model-answer ul {
    margin-left: 20px;
    margin-top: 8px;
  }

  .model-answer li {
    margin-bottom: 6px;
    color: #cbd5e1;
  }

  .results {
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    border-radius: 16px;
    padding: 50px 30px;
    text-align: center;
    color: white;
    display: none;
    box-shadow: 0 10px 40px rgba(99, 102, 241, 0.4);
  }

  .results.show {
    display: block;
  }

  .results h2 {
    font-size: 2.5rem;
    margin-bottom: 10px;
  }

  .results .score {
    font-size: 4rem;
    font-weight: bold;
    margin: 20px 0;
  }

  .results .grade {
    font-size: 1.5rem;
    margin-bottom: 8px;
    font-weight: 600;
  }

  .results .message {
    font-size: 1.1rem;
    opacity: 0.95;
    max-width: 500px;
    margin: 0 auto 30px;
  }

  .grade-distinction { color: #fef3c7; }
  .grade-pass { color: #d1fae5; }
  .grade-borderline { color: #fed7aa; }
  .grade-retake { color: #fecaca; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  code {
    background: #0f172a;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Courier New', Monaco, monospace;
    font-size: 0.9em;
    color: #a5b4fc;
  }

  .hint {
    color: #94a3b8;
    font-size: 0.85rem;
    margin-top: 8px;
    font-style: italic;
  }

  footer {
    text-align: center;
    padding: 30px 20px;
    color: #64748b;
    font-size: 0.85rem;
    margin-top: 40px;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.5rem; }
    .question-card { padding: 20px; }
    .results .score { font-size: 3rem; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🚀 GitHub Actions Lab 1</h1>
    <p>Interactive End-of-Lesson Quiz</p>
  </header>

  <div class="stats-row">
    <span id="progress-text">Question 1 of 11</span>
    <span id="score-text">Score: 0 / 5</span>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div id="quiz-container"></div>

  <div class="results" id="results">
    <h2>🎉 Quiz Complete!</h2>
    <div class="score" id="final-score">0 / 5</div>
    <div class="grade" id="grade-label"></div>
    <p class="message" id="grade-message"></p>
    <button class="btn btn-secondary" onclick="restartQuiz()">Restart Quiz</button>
  </div>

  <footer>
    Cloudboosta Cloud DevOps Training · GitHub Actions Module · Lab 1
  </footer>
</div>

<script>
const questions = [
  {
    section: "Section A — Multiple Choice",
    type: "mc",
    question: "Where must a GitHub Actions workflow file live to be detected?",
    options: [
      "In the root of the repository",
      "In a folder called <code>github/workflows/</code>",
      "In a folder called <code>.github/workflows/</code>",
      "In a folder called <code>.workflows/</code>"
    ],
    correct: 2,
    explanation: "The folder must literally be <code>.github/workflows/</code> — note the dot, lowercase, plural."
  },
  {
    section: "Section A — Multiple Choice",
    type: "mc",
    question: "Which of these is NOT one of the 5 building blocks of a workflow?",
    options: ["Event", "Job", "Database", "Runner"],
    correct: 2,
    explanation: "The 5 are: Event, Workflow, Job, Runner, Step. Database is not one of them."
  },
  {
    section: "Section A — Multiple Choice",
    type: "mc",
    question: "What does <code>runs-on: ubuntu-latest</code> mean?",
    options: [
      "The workflow runs on the user's laptop",
      "GitHub will provide a fresh Ubuntu Linux virtual machine",
      "The workflow only runs on Ubuntu computers in the office",
      "The workflow installs Ubuntu on GitHub's servers permanently"
    ],
    correct: 1,
    explanation: "GitHub provisions a fresh Ubuntu VM, runs the job, then destroys it."
  },
  {
    section: "Section A — Multiple Choice",
    type: "mc",
    question: "Which line of YAML is correctly written?",
    options: [
      "<code>name:Hello Workflow</code>",
      "<code>name: Hello Workflow</code>",
      "<code>name = Hello Workflow</code>",
      "<code>name- Hello Workflow</code>"
    ],
    correct: 1,
    explanation: "YAML requires a space after the colon. <code>name:Hello</code> is invalid; <code>name: Hello</code> is valid."
  },
  {
    section: "Section A — Multiple Choice",
    type: "mc",
    question: "When you push a workflow file to GitHub, the runner starts up with:",
    options: [
      "Your full repository code already on it",
      "Only the <code>README.md</code> file",
      "An empty Linux machine — your code is NOT there yet",
      "The previous runner's leftover files"
    ],
    correct: 2,
    explanation: "The runner is empty until you explicitly check out code with <code>actions/checkout</code>."
  },
  {
    section: "Section B — Short Answer",
    type: "short",
    question: "In your own words, what is the difference between a step that uses <code>run:</code> and a step that uses <code>uses:</code>?",
    hint: "Think about who wrote the code in each case.",
    modelAnswer: `<ul>
      <li><code>run:</code> executes a shell command that <strong>you wrote yourself</strong> (e.g. <code>echo "hello"</code>).</li>
      <li><code>uses:</code> imports a <strong>pre-built action</strong> made by someone else from the GitHub Marketplace (e.g. <code>actions/checkout@v4</code>).</li>
      <li>A step does ONE of the two — never both.</li>
    </ul>`
  },
  {
    section: "Section B — Short Answer",
    type: "short",
    question: "Name the three triggers we used in Lab 1 and explain when each one fires.",
    hint: "Look back at your <code>on:</code> block.",
    modelAnswer: `<ul>
      <li><strong>push</strong> — fires when someone pushes a commit (to the listed branch).</li>
      <li><strong>pull_request</strong> — fires when a pull request is opened, updated, or reopened.</li>
      <li><strong>workflow_dispatch</strong> — fires when a user clicks the "Run workflow" button manually.</li>
    </ul>`
  },
  {
    section: "Section B — Short Answer",
    type: "short",
    question: "What does <code>\${{ github.actor }}</code> evaluate to, and at what moment is the value filled in?",
    hint: "Two things to mention: WHAT it gives you and WHEN GitHub replaces it.",
    modelAnswer: `<ul>
      <li>It evaluates to the <strong>GitHub username</strong> of the person who triggered the workflow run.</li>
      <li>The value is filled in by GitHub <strong>at runtime</strong> — when the run is queued, before the runner starts executing steps.</li>
    </ul>`
  },
  {
    section: "Section B — Short Answer",
    type: "short",
    question: "Write the correct folder + file path where a workflow named <code>ci.yml</code> must be saved.",
    hint: "Three rules: dot, lowercase, plural.",
    modelAnswer: `<pre>.github/workflows/ci.yml</pre>`
  },
  {
    section: "Section B — Short Answer",
    type: "short",
    question: "List two common reasons a workflow does not appear in the Actions tab after pushing.",
    hint: "Think about folder names, file extensions, and where the file lives.",
    modelAnswer: `<p>Any TWO of the following:</p>
    <ul>
      <li>Folder name is wrong (e.g. <code>github</code> instead of <code>.github</code>, or <code>workflow</code> instead of <code>workflows</code>).</li>
      <li>File extension is missing or wrong (must be <code>.yml</code> or <code>.yaml</code>).</li>
      <li>The file was not actually pushed to GitHub (only saved locally).</li>
      <li>The workflow file is on a non-default branch.</li>
      <li>YAML syntax error stopping GitHub from parsing the file.</li>
      <li>GitHub Actions is disabled on a forked repository.</li>
    </ul>`
  },
  {
    section: "Section C — Practical",
    type: "yaml",
    question: `Write a complete, valid workflow file that:
      <ul style="margin-top:12px;">
        <li>Is named <strong>"Greeting"</strong></li>
        <li>Runs only when code is pushed to the <code>main</code> branch</li>
        <li>Has one job called <code>greet</code> running on Ubuntu</li>
        <li>Has one step that prints <code>Hello [your username]</code> using the GitHub context variable</li>
      </ul>`,
    hint: "Don't forget: spaces (not tabs), a space after each colon, and the correct <code>\${{ }}</code> syntax.",
    modelAnswer: `<pre>name: Greeting

on:
  push:
    branches: [main]

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: Say hello
        run: echo "Hello \${{ github.actor }}"</pre>`
  }
];

let currentQuestion = 0;
let mcScore = 0;
const totalMC = questions.filter(q => q.type === "mc").length;
const totalQuestions = questions.length;

function renderQuestion() {
  const container = document.getElementById("quiz-container");
  const q = questions[currentQuestion];

  let html = `
    <div class="question-card">
      <div class="section-tag">${q.section}</div>
      <span class="question-number">Question ${currentQuestion + 1}</span>
      <p class="question-text">${q.question}</p>
  `;

  if (q.type === "mc") {
    html += `<div class="options">`;
    q.options.forEach((opt, idx) => {
      const letter = String.fromCharCode(65 + idx);
      html += `
        <button class="option" onclick="selectOption(${idx})" data-index="${idx}">
          <span class="option-letter">${letter}</span>${opt}
        </button>
      `;
    });
    html += `</div>`;
    html += `<div class="feedback" id="feedback"></div>`;
    html += `<button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Next Question →</button>`;
  } else if (q.type === "short") {
    html += `<textarea id="user-answer" placeholder="Type your answer here..."></textarea>`;
    if (q.hint) html += `<p class="hint">💡 ${q.hint}</p>`;
    html += `<button class="btn" onclick="revealAnswer()">Reveal Model Answer</button>`;
    html += `<div class="model-answer" id="model-answer"><h4>📘 Model Answer</h4>${q.modelAnswer}</div>`;
    html += `<button class="btn" id="next-btn" onclick="nextQuestion()" style="display:none;">Next Question →</button>`;
  } else if (q.type === "yaml") {
    html += `<textarea class="yaml-input" id="user-answer" placeholder="Write your YAML here..."></textarea>`;
    if (q.hint) html += `<p class="hint">💡 ${q.hint}</p>`;
    html += `<button class="btn" onclick="revealAnswer()">Reveal Model Answer</button>`;
    html += `<div class="model-answer" id="model-answer"><h4>📘 Model Answer</h4>${q.modelAnswer}</div>`;
    html += `<button class="btn" id="next-btn" onclick="nextQuestion()" style="display:none;">Finish Quiz →</button>`;
  }

  html += `</div>`;
  container.innerHTML = html;

  updateProgress();
}

function selectOption(idx) {
  const q = questions[currentQuestion];
  const buttons = document.querySelectorAll(".option");
  const feedback = document.getElementById("feedback");
  const nextBtn = document.getElementById("next-btn");

  buttons.forEach(btn => btn.disabled = true);

  if (idx === q.correct) {
    buttons[idx].classList.add("correct");
    feedback.classList.add("show", "correct");
    feedback.innerHTML = `<strong>✓ Correct!</strong> ${q.explanation}`;
    mcScore++;
  } else {
    buttons[idx].classList.add("wrong");
    buttons[q.correct].classList.add("correct");
    feedback.classList.add("show", "incorrect");
    feedback.innerHTML = `<strong>✗ Not quite.</strong> ${q.explanation}`;
  }

  nextBtn.disabled = false;
  document.getElementById("score-text").textContent = `Score: ${mcScore} / ${totalMC}`;
}

function revealAnswer() {
  document.getElementById("model-answer").classList.add("show");
  document.getElementById("next-btn").style.display = "inline-block";
}

function nextQuestion() {
  currentQuestion++;
  if (currentQuestion < totalQuestions) {
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    showResults();
  }
}

function updateProgress() {
  const percent = ((currentQuestion) / totalQuestions) * 100;
  document.getElementById("progress-fill").style.width = percent + "%";
  document.getElementById("progress-text").textContent =
    `Question ${currentQuestion + 1} of ${totalQuestions}`;
}

function showResults() {
  document.getElementById("quiz-container").style.display = "none";
  document.querySelector(".stats-row").style.display = "none";
  document.querySelector(".progress-bar").style.display = "none";
  const results = document.getElementById("results");
  results.classList.add("show");

  const percent = (mcScore / totalMC) * 100;
  document.getElementById("final-score").textContent = `${mcScore} / ${totalMC}`;

  let grade, message, gradeClass;
  if (percent >= 90) {
    grade = "🏆 Distinction";
    message = "Outstanding! You have a strong grasp of GitHub Actions fundamentals. You're ready for Lab 2 — checkout, dependencies, and matrix builds.";
    gradeClass = "grade-distinction";
  } else if (percent >= 70) {
    grade = "✓ Pass";
    message = "Solid foundation! Review any questions you got wrong, then move on to Lab 2 with confidence.";
    gradeClass = "grade-pass";
  } else if (percent >= 50) {
    grade = "⚠ Borderline";
    message = "You've got the basics but need a quick review. Re-read the Key Concepts section before starting Lab 2.";
    gradeClass = "grade-borderline";
  } else {
    grade = "↻ Re-take Recommended";
    message = "Don't worry — these concepts take practice. Repeat Lab 1, then come back to this quiz.";
    gradeClass = "grade-retake";
  }

  const gradeEl = document.getElementById("grade-label");
  gradeEl.textContent = grade;
  gradeEl.className = "grade " + gradeClass;
  document.getElementById("grade-message").textContent = message;

  document.getElementById("progress-fill").style.width = "100%";
}

function restartQuiz() {
  currentQuestion = 0;
  mcScore = 0;
  document.getElementById("score-text").textContent = `Score: 0 / ${totalMC}`;
  document.getElementById("results").classList.remove("show");
  document.getElementById("quiz-container").style.display = "block";
  document.querySelector(".stats-row").style.display = "flex";
  document.querySelector(".progress-bar").style.display = "block";
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
